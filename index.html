<!doctype html><meta charset=utf-8><title>→ Pepper</title>
<meta http-equiv="Cache-Control" content="no-store, max-age=0">
<body style="font:600 16px system-ui;padding:1.4rem;line-height:1.9;text-align:center">
<script>
  // hash = pełny URL Peppera przekazany przez Charlesa (wszystko po pierwszym #)
  var pepper = location.hash.slice(1);                 // https://www.pepper.pl/...#charles=...
  var data   = pepper.replace(/^https:\/\//,'').replace('#','%23');
  // package=org.mozilla.firefox — stabilna, publiczna paczka Firefoksa (Tampermonkey).
  // intent:// wyrywa się z WebView Telegrama i otwiera Firefoksa wprost na Pepperze.
  var intent = 'intent://'+data+'#Intent;scheme=https;package=org.mozilla.firefox;end';
  if (pepper) location.href = intent;                  // auto: otwórz Firefoksa na Pepperze
</script>
<p>Jeśli nie przeskoczyło automatycznie:</p>
<p><a id=f href="#" style="font-size:22px">🦊 Otwórz w Firefoksie</a></p>
<p style="opacity:.55;font-size:14px"><a id=p href="#">…albo zwykły redirect</a></p>
<script>
  f.href = intent;      // fallback z user-gesture (gdyby auto-intent był zablokowany)
  p.href = pepper;      // ostateczny fallback: czysty redirect
</script>
