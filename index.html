<!doctype html><meta charset=utf-8><title>→ Pepper</title>
<body style="font:600 18px system-ui;text-align:center;padding:2rem">
<script>
  // hash = pełny URL Peppera przekazany przez Charlesa (wszystko po pierwszym #)
  var pepper = location.hash.slice(1);                 // https://www.pepper.pl/...#charles=...
  // intent:// wymusza KIWI, wyrywa się z in-app webview Telegrama i omija apkę Peppera.
  // %23 = zakodowany fragment #charles=..., by przetrwał parsowanie intent-URI.
  var data   = pepper.replace(/^https:\/\//,'').replace('#','%23');
  var intent = 'intent://'+data+'#Intent;scheme=https;package=com.kiwibrowser.browser;end';
  if (pepper) location.href = intent;                  // auto-próba (Kiwi)
</script>
<p>Jeśli nie przeskoczyło automatycznie:</p>
<p><a id=k href="#">🦅 Otwórz w Kiwi (autofill)</a></p>
<p style="opacity:.6"><a id=p href="#">…albo zwykłym redirectem</a></p>
<script>
  k.href = intent;                                     // fallback z user-gesture
  p.href = pepper;                                     // awaryjnie: czysty redirect do Peppera
</script>
